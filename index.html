<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Tic-Tac-Toe 🎮</h1>
        
        <div class="mode-selection">
            <button class="mode-btn active" data-mode="pvp">👥 Player vs Player</button>
            <button class="mode-btn" data-mode="pvb">🤖 Player vs Bot</button>
        </div>

        <div class="game-info">
            <div class="current-player">Current Player: <span id="current">X</span></div>
            <div class="score-board">
                <div class="score">Player X: <span id="scoreX">0</span></div>
                <div class="score">Draws: <span id="scoreDraw">0</span></div>
                <div class="score">Player O: <span id="scoreO">0</span></div>
            </div>
        </div>

        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="controls">
            <button class="btn reset-btn" id="resetBtn">🔄 New Game</button>
            <button class="btn reset-score-btn" id="resetScoreBtn">📊 Reset Score</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
